<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto — Importech</title>
<meta name="description" content="iPhones y AirPods originales — Importech Col, Bogotá.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--blue:#9898a0;--blue-h:#6e6e76;--nuevo:#34c759;--airpods:#0071e3;--bg:#06060a;--card:#111115;--dark:#1d1d1f;--dborder:rgba(255,255,255,.08);--white:#fff}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:#fff;overflow-x:hidden}
img{display:block}a{color:inherit;text-decoration:none}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 52px;background:rgba(6,6,10,.92);backdrop-filter:blur(20px) saturate(1.8);border-bottom:1px solid var(--dborder)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0}
.logo-mark img{width:36px;height:36px;border-radius:50%;object-fit:cover;display:block}
.nav-name{display:flex;align-items:baseline}
.nav-links{display:flex;align-items:center;gap:24px;list-style:none}
.nav-links a{color:rgba(255,255,255,.62);text-decoration:none;font-size:13px;font-weight:500;transition:color .2s}
.nav-links a:hover{color:#fff}
.nav-cta{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:20px;background:var(--blue);color:#fff!important;font-size:13px!important;font-weight:600!important;text-decoration:none;transition:background .2s}
.nav-cta:hover{background:var(--blue-h)}
.cart-nav-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.14);color:#fff;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
.cart-nav-btn:hover{background:rgba(152,152,160,.2);border-color:var(--blue)}
.cart-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--blue);color:#fff;font-size:10px;font-weight:700;line-height:1}
.cart-badge.empty{background:rgba(255,255,255,.22)}

/* HAMBURGER */
.nav-ham{display:none;flex-direction:column;gap:5px;align-items:center;justify-content:center;width:36px;height:36px;border:none;background:transparent;cursor:pointer;padding:6px;border-radius:8px;transition:background .2s}
.nav-ham:hover{background:rgba(255,255,255,.07)}
.nav-ham span{display:block;width:20px;height:2px;background:#fff;border-radius:2px;transition:all .25s}
.nav-ham.open span:first-child{transform:translateY(7px) rotate(45deg)}
.nav-ham.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.nav-ham.open span:last-child{transform:translateY(-7px) rotate(-45deg)}

/* MOBILE MENU */
.mob-menu{position:fixed;inset:0;z-index:190;background:rgba(6,6,10,.97);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:36px;opacity:0;pointer-events:none;transition:opacity .28s;padding:20px}
.mob-menu.show{opacity:1;pointer-events:auto}
.mob-menu a,.mob-menu button.mob-link{font-size:26px;font-weight:700;color:rgba(255,255,255,.8);text-decoration:none;letter-spacing:.02em;background:none;border:none;cursor:pointer;font-family:inherit;transition:color .2s}
.mob-menu a:hover,.mob-menu button.mob-link:hover{color:#fff}
.mob-wa{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;border-radius:50px;background:#25d366;color:#fff;font-size:16px;font-weight:700;margin-top:8px}

/* BREADCRUMB */
.bc-bar{padding:72px 52px 0;background:var(--bg)}
.bc-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.38);padding-top:20px}
.bc-inner a{color:rgba(255,255,255,.5);transition:color .2s}
.bc-inner a:hover{color:#fff}
.bc-sep{color:rgba(255,255,255,.2)}

/* PRODUCT HERO */
.prod-sec{padding:32px 52px 80px;background:var(--bg)}
.prod-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
.prod-image-wrap{background:#f4f4f6;border-radius:24px;overflow:hidden;aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:32px;position:relative}
.prod-image-wrap img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 16px 40px rgba(0,0,0,.15))}
.prod-badge-wrap{position:absolute;top:18px;left:18px}
.cond-badge{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:20px;color:#fff;display:inline-block;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.b-nuevo{background:var(--nuevo)}.b-semi{background:var(--blue)}.b-airpods{background:var(--airpods)}

/* PRODUCT INFO */
.prod-detail{padding-top:8px}
.prod-brand{font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:8px}
.prod-name{font-size:clamp(28px,4vw,48px);font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.1;margin-bottom:6px}
.prod-spec-line{font-size:14px;color:rgba(255,255,255,.42);margin-bottom:28px}
.prod-price-block{margin-bottom:32px}
.prod-price-block small{font-size:12px;color:rgba(255,255,255,.4);font-weight:400;display:block;margin-bottom:4px}
.prod-price{font-size:40px;font-weight:800;color:#fff;letter-spacing:-.02em}
.prod-features{list-style:none;margin-bottom:36px;display:flex;flex-direction:column;gap:10px}
.prod-features li{display:flex;align-items:center;gap:10px;font-size:14px;color:rgba(255,255,255,.65)}
.prod-features li::before{content:'';width:18px;height:18px;border-radius:50%;background:rgba(152,152,160,.15);border:1.5px solid var(--blue);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.prod-feature-check{width:18px;height:18px;border-radius:50%;background:rgba(152,152,160,.15);border:1.5px solid var(--blue);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--blue);font-weight:700}
.prod-btns{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.prod-cart-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border-radius:14px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;border:none;font-family:inherit;cursor:pointer;transition:all .25s}
.prod-cart-btn:hover{background:var(--blue-h);transform:translateY(-1px);box-shadow:0 8px 24px rgba(152,152,160,.25)}
.prod-cart-btn.added{background:#34c759}
.prod-wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border-radius:14px;background:#25d366;color:#fff;font-size:15px;font-weight:700;transition:all .25s;text-decoration:none}
.prod-wa-btn:hover{background:#1db857;transform:translateY(-1px);box-shadow:0 8px 24px rgba(37,211,102,.3)}
.prod-trust{display:flex;gap:20px;flex-wrap:wrap}
.prod-trust span{font-size:12px;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:5px}

/* RELATED */
.related-sec{background:#0a0a0e;padding:72px 52px}
.related-inner{max-width:1200px;margin:0 auto}
.related-eyebrow{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--blue);margin-bottom:10px;display:block}
.related-h2{font-size:clamp(22px,3vw,34px);font-weight:800;color:#fff;letter-spacing:-.02em;margin-bottom:32px}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.rc{background:var(--card);border-radius:16px;border:1px solid rgba(255,255,255,.07);overflow:hidden;transition:all .3s;display:flex;flex-direction:column;text-decoration:none}
.rc:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(152,152,160,.12);border-color:rgba(152,152,160,.22)}
.rc-top{height:180px;display:flex;align-items:center;justify-content:center;background:#f4f4f6;padding:16px}
.rc-top img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 6px 16px rgba(0,0,0,.12));transition:transform .4s}
.rc:hover .rc-top img{transform:scale(1.05)}
.rc-body{padding:16px 18px 18px}
.rc-brand{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.38);margin-bottom:4px}
.rc-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:10px}
.rc-price{font-size:18px;font-weight:800;color:#fff;margin-bottom:12px}
.rc-price small{font-size:11px;font-weight:400;color:rgba(255,255,255,.38);display:block;margin-bottom:2px}
.rc-btn{display:flex;align-items:center;justify-content:center;padding:9px;border-radius:10px;background:var(--blue);color:#fff;font-size:12px;font-weight:600;text-decoration:none;transition:background .2s;border:none;font-family:inherit;cursor:pointer;width:100%}
.rc-btn:hover{background:var(--blue-h)}

/* CART DRAWER */
#cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:800;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px)}
#cart-overlay.show{opacity:1;pointer-events:auto}
#cart-drawer{position:fixed;top:0;right:0;bottom:0;width:400px;max-width:96vw;background:#111115;border-left:1px solid rgba(255,255,255,.1);z-index:801;transform:translateX(105%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-24px 0 60px rgba(0,0,0,.55)}
#cart-drawer.open{transform:translateX(0)}
.cart-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.07)}
.cart-head h3{font-size:17px;font-weight:700;color:#fff}
.cart-close-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cart-close-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.cart-items{flex:1;overflow-y:auto;padding:8px 24px 16px}
.cart-empty{text-align:center;padding:56px 0;color:rgba(255,255,255,.28)}
.cart-empty .ce-ico{font-size:44px;margin-bottom:14px}
.cart-empty p{font-size:14px}
.cart-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.cart-item:last-child{border:none}
.ci-info{flex:1;min-width:0}
.ci-info .ci-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-info .ci-price{font-size:12px;color:rgba(255,255,255,.4)}
.ci-qty{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ci-qty button{width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#fff;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;line-height:1;padding:0}
.ci-qty button:hover{background:rgba(152,152,160,.25);border-color:var(--blue)}
.ci-qty .cq-n{min-width:20px;text-align:center;font-size:14px;font-weight:700;color:#fff}
.ci-del{width:28px;height:28px;border-radius:7px;border:none;background:rgba(255,60,60,.1);color:rgba(255,100,100,.7);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ci-del:hover{background:rgba(255,60,60,.22);color:#ff6060}
.cart-foot{padding:18px 24px 24px;border-top:1px solid rgba(255,255,255,.07)}
.cart-total-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cart-total-row .ct-label{font-size:13px;color:rgba(255,255,255,.44)}
.cart-total-row .ct-amt{font-size:24px;font-weight:800;color:#fff;letter-spacing:-.02em}
.cart-wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:12px;border:none;background:#25d366;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .25s;margin-bottom:9px}
.cart-wa-btn:hover{background:#1db857;box-shadow:0 8px 24px rgba(37,211,102,.35);transform:translateY(-1px)}
.cart-wa-btn:disabled{background:rgba(255,255,255,.1);color:rgba(255,255,255,.3);cursor:not-allowed;transform:none;box-shadow:none}
.cart-clear-btn{display:block;width:100%;padding:9px;border-radius:9px;border:1px solid rgba(255,255,255,.09);background:transparent;color:rgba(255,255,255,.32);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.cart-clear-btn:hover{border-color:rgba(255,90,90,.35);color:rgba(255,90,90,.75)}

/* WA FLOAT */
.wa-float{position:fixed;bottom:28px;right:28px;z-index:999;width:56px;height:56px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 6px 20px rgba(37,211,102,.4);transition:transform .2s}
.wa-float:hover{transform:scale(1.1)}
.wa-float::before{content:'';position:absolute;inset:-6px;border-radius:50%;background:rgba(37,211,102,.18);animation:wap 2.2s ease-out infinite}
@keyframes wap{0%{transform:scale(.95);opacity:.9}100%{transform:scale(1.5);opacity:0}}

/* NOT FOUND */
.notfound{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
.notfound h1{font-size:48px;font-weight:800;color:#fff;margin-bottom:12px}
.notfound p{font-size:16px;color:rgba(255,255,255,.42);margin-bottom:28px}
.notfound a{display:inline-flex;align-items:center;gap:7px;padding:13px 28px;border-radius:50px;background:var(--blue);color:#fff;font-size:14px;font-weight:600}

/* RESPONSIVE */
@media(max-width:900px){.prod-inner{grid-template-columns:1fr;gap:40px}.related-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){nav{padding:0 20px}.nav-links{display:none}.nav-ham{display:flex}.bc-bar{padding:72px 22px 0}.prod-sec{padding:24px 22px 60px}.related-sec{padding:52px 22px}.related-grid{grid-template-columns:1fr}}

/* ── BRAND ANIMATIONS ── */
/* Chrome metallic wordmark */
@keyframes chrome-sweep{0%{background-position:200% center}100%{background-position:-200% center}}
.nav-wordmark{font-size:15px;font-weight:800;letter-spacing:.06em;background:linear-gradient(90deg,rgba(200,200,210,.75) 0%,#fff 22%,rgba(200,200,210,.9) 38%,#fff 50%,rgba(180,180,190,.75) 62%,#fff 78%,rgba(200,200,210,.75) 100%);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:chrome-sweep 5s linear infinite}
.nav-sub{color:rgba(255,255,255,.4);font-weight:400;font-size:13px;margin-left:6px;letter-spacing:0}
/* Titanium shimmer — sweeps across product image on hover */
.prod-image-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 25%,rgba(255,255,255,.2) 50%,transparent 75%);transform:translateX(-110%);transition:transform .6s ease;pointer-events:none;z-index:1}
.prod-image-wrap:hover::after{transform:translateX(110%)}
/* Camera lens glow — pulsing radial on iPhone images */
@keyframes cam-glow{0%,100%{opacity:0;transform:scale(.7)}50%{opacity:.85;transform:scale(1)}}
.cam-glow-prod{position:absolute;top:18px;right:18px;width:80px;height:80px;border-radius:50%;background:radial-gradient(ellipse,rgba(152,152,160,.55) 0%,transparent 70%);animation:cam-glow 4.5s ease-in-out infinite;pointer-events:none;z-index:2}
/* Urgency / scarcity strip */
@keyframes pu-blink{0%,100%{opacity:1}50%{opacity:.45}}
.prod-urgency{margin:0 0 24px;padding:12px 16px;border-radius:12px;background:rgba(152,152,160,.07);border:1px solid rgba(152,152,160,.15);display:flex;flex-direction:column;gap:6px}
.pu-row{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.65)}
.pu-dot{width:7px;height:7px;border-radius:50%;background:#34c759;flex-shrink:0;animation:pu-blink 1.6s ease-in-out infinite}
.pu-stock{font-size:12px;font-weight:700;color:#ff9f0a;letter-spacing:.01em}
/* WhatsApp button pulse */
@keyframes wa-pulse{0%,100%{box-shadow:0 8px 24px rgba(37,211,102,.35)}50%{box-shadow:0 14px 40px rgba(37,211,102,.65)}}
.prod-wa-btn{animation:wa-pulse 2.5s ease-in-out infinite}
/* Feature list staggered reveal */
.prod-features li{opacity:0;transform:translateX(-18px);transition:opacity .4s ease,transform .4s ease}
.prod-features li.visible{opacity:1;transform:translateX(0)}
/* Related card titanium shimmer */
.rc{position:relative;overflow:hidden}
.rc::after{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 25%,rgba(255,255,255,.09) 50%,transparent 75%);transform:translateX(-110%);transition:transform .55s ease;pointer-events:none;z-index:1}
.rc:hover::after{transform:translateX(110%)}
/* Badge glow pulse for nuevo products */
@keyframes badge-shine{0%,80%,100%{box-shadow:0 2px 8px rgba(0,0,0,.18)}90%{box-shadow:0 2px 14px rgba(52,199,89,.55)}}
.b-nuevo{animation:badge-shine 3.2s ease-in-out infinite}
/* Scroll reveal */
.rev{opacity:0;transform:translateY(24px);transition:opacity .55s ease,transform .55s ease}
.rev.in{opacity:1;transform:translateY(0)}
</style>
</head>

<div class="mob-menu" id="mob-menu">
  <a href="index.html#catalog" onclick="closeMob()">Catálogo</a>

/* ── CART (localStorage) ── */
const CART_KEY='importech-cart';
function getCart(){try{return JSON.parse(localStorage.getItem(CART_KEY)||'[]');}catch(e){return[];}}
function saveCart(c){try{localStorage.setItem(CART_KEY,JSON.stringify(c));}catch(e){}}
function fmtCOP(n){return'$'+Math.round(n).toLocaleString('es-CO');}
function cartSum(){return getCart().reduce((s,i)=>s+i.price*i.qty,0);}

function cartAdd(name,price){
  const c=getCart();
  const ex=c.find(i=>i.name===name);
  if(ex){ex.qty++;}else{c.push({name,price,qty:1});}
  saveCart(c);updateCartUI();openCart();
  const btn=document.getElementById('prod-cart-btn');
  if(btn){btn.textContent='✓ Agregado';btn.classList.add('added');setTimeout(()=>{btn.textContent='🛒 Agregar al carrito';btn.classList.remove('added');},2000);}
}
function cartDel(name){const c=getCart();const i=c.findIndex(x=>x.name===name);if(i>-1)c.splice(i,1);saveCart(c);updateCartUI();}
function cartQty(name,d){const c=getCart();const it=c.find(x=>x.name===name);if(!it)return;it.qty=Math.max(1,it.qty+d);saveCart(c);updateCartUI();}
function cartClear(){saveCart([]);updateCartUI();}

function updateCartUI(){
  const c=getCart();
  const count=c.reduce((s,i)=>s+i.qty,0);
  const badge=document.getElementById('cart-count');
  if(badge){badge.textContent=count;badge.className='cart-badge'+(count===0?' empty':'');}
  const box=document.getElementById('cart-items');
  if(!box)return;
  if(!c.length){
    box.innerHTML='<div class="cart-empty"><div class="ce-ico">🛒</div><p>Tu carrito está vacío</p></div>';
  }else{
    box.innerHTML=c.map(i=>`<div class="cart-item">
      <div class="ci-info"><div class="ci-name">${i.name}</div><div class="ci-price">${fmtCOP(i.price)} c/u</div></div>
      <div class="ci-qty">
        <button onclick="cartQty(${JSON.stringify(i.name)},-1)">−</button>
        <span class="cq-n">${i.qty}</span>
        <button onclick="cartQty(${JSON.stringify(i.name)},1)">+</button>
      </div>
      <button class="ci-del" onclick="cartDel(${JSON.stringify(i.name)})">✕</button>
    </div>`).join('');
  }
  document.getElementById('cart-total-amt').textContent=fmtCOP(cartSum());
  const btn=document.getElementById('cart-checkout-btn');
  if(btn)btn.disabled=!c.length;
}
function openCart(){document.getElementById('cart-overlay').classList.add('show');document.getElementById('cart-drawer').classList.add('open');}

}

/* ── BRAND ANIMATION INIT ── */
(function(){
  /* Live viewer count fluctuation */
  const ve=document.getElementById('prod-viewers');
  if(ve){
    const tick=()=>{if(Math.random()>.5){const c=parseInt(ve.textContent)||10;ve.textContent=Math.max(3,Math.min(28,c+(Math.random()>.5?1:-1)));}};
    setInterval(tick,3200+Math.random()*2800);
  }

  /* Price count-up animation */
  const pe=document.getElementById('prod-price-display');
  if(pe&&product){
    const target=product.price;const dur=1600;let st=null;
    function priceStep(ts){if(!st)st=ts;const p=Math.min((ts-st)/dur,1);const e=1-Math.pow(1-p,3);pe.textContent='$'+Math.round(target*e).toLocaleString('es-CO');if(p<1)requestAnimationFrame(priceStep);}
    requestAnimationFrame(priceStep);
  }

  /* Feature list staggered reveal */
  const ul=document.querySelector('.prod-features');
  if(ul){
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          e.target.querySelectorAll('li').forEach((li,i)=>setTimeout(()=>li.classList.add('visible'),i*90));
          obs.unobserve(e.target);
        }
      });
    },{threshold:.1});
    obs.observe(ul);
  }

  /* Scroll reveal for .rev elements */
  const ro=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');ro.unobserve(e.target);}});
  },{threshold:.08});
  document.querySelectorAll('.rev').forEach(el=>ro.observe(el));
})();
